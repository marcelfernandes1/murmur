name: Murmur
options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.4.39"
    CURRENT_PROJECT_VERSION: "73"
    PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
    ENABLE_HARDENED_RUNTIME: "YES"
    # Sign with a stable Development identity (not ad-hoc) so macOS keeps the
    # Accessibility/Microphone grants across rebuilds instead of re-prompting.
    DEVELOPMENT_TEAM: M8KUF8S2L5
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: 78E02B12F2833D1842B84B38E7A5FF0D2E492344
    PROVISIONING_PROFILE_SPECIFIER: ""
    COMBINE_HIDPI_IMAGES: "YES"

# Third-party SPM packages (added per-phase to keep each build green).
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    from: "1.0.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.12.0"
  LLM:
    url: https://github.com/eastriverlee/LLM.swift
    from: "2.1.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  # whisper.cpp's official prebuilt XCFramework (Metal + Core ML), wrapped by a
  # tiny local package so models run GPU-accelerated on Apple Silicon. See
  # Vendor/WhisperCpp/Package.swift for why the binary release (not source).
  WhisperCpp:
    path: Vendor/WhisperCpp

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Murmur
    settings:
      base:
        INFOPLIST_FILE: Murmur/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Murmur/Support/Murmur.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
      - package: DynamicNotchKit
      - package: FluidAudio
      - package: LLM
      - package: Sparkle
      - package: WhisperCpp
        product: WhisperCppKit

schemes:
  Murmur:
    build:
      targets:
        Murmur: all
    run:
      config: Debug
    archive:
      config: Release
