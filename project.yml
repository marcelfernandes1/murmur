name: Murmur
options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
    ENABLE_HARDENED_RUNTIME: "YES"
    CODE_SIGN_STYLE: Automatic
    COMBINE_HIDPI_IMAGES: "YES"

# Third-party SPM packages (added per-phase to keep each build green).
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    from: "1.0.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.12.0"
  LLM:
    url: https://github.com/eastriverlee/LLM.swift
    from: "2.1.0"

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Murmur
    settings:
      base:
        INFOPLIST_FILE: Murmur/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Murmur/Support/Murmur.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
      - package: DynamicNotchKit
      - package: FluidAudio
      - package: LLM

schemes:
  Murmur:
    build:
      targets:
        Murmur: all
    run:
      config: Debug
    archive:
      config: Release
